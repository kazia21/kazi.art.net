export default function App() {
  const [textIndex, setTextIndex] = useState(0);
  const [showTextBox, setShowTextBox] = useState(true);
  const [isHovering, setIsHovering] = useState(false);

  const texts = [
    { text: '"Where am I?"', italic: true },
    { text: '"..."', italic: true },
    { text: '', italic: false }, // Empty screen
    { text: "You wake up in the woods. You can't remember anything really, everything is so blury.", italic: false },
    { text: "You can't recognize the woods but this familiar feeling is haunting you. Maybe you're just having a bad dream again... ", italic: false },
    { text: "Start searching images on the screen with your cursor to start to remember!", italic: false, glow: true }
  ];

  const handleClick = () => {
    if (textIndex < texts.length - 1) {
      setTextIndex(textIndex + 1);
    }
  };

  const handleGlowTextClick = (e: React.MouseEvent) => {
    e.stopPropagation();
    setShowTextBox(false);
  };

  return (
    <div 
      className="size-full relative overflow-hidden cursor-pointer"
      onClick={handleClick}
      style={{
        backgroundImage: `url(${backgroundImage})`,
        backgroundSize: 'cover',
        backgroundPosition: 'center',
      }}
    >
      {/* Text Box */}
      {showTextBox && texts[textIndex].text && (
        <div className={`absolute left-1/2 -translate-x-1/2 w-[90%] max-w-xl ${
          textIndex < 2 ? 'bottom-8' : 'top-[55%] -translate-y-1/2'
        }`}>
          <div className="bg-black p-6 shadow-2xl">
            <p 
              className={`text-white text-center ${texts[textIndex].italic ? 'italic' : ''} ${texts[textIndex].glow ? 'cursor-pointer' : ''}`}
              style={{ 
                fontFamily: "'Anonymous Pro', monospace",
                fontSize: texts[textIndex].glow ? '16px' : '12px',
                lineHeight: '1.5rem',
                letterSpacing: '0.05em',
                transition: 'text-shadow 0.3s ease',
                ...(texts[textIndex].glow && {
                  textShadow: isHovering 
                    ? '0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(240, 240, 240, 1), 0 0 60px rgba(220, 220, 220, 0.9), 0 0 80px rgba(200, 200, 200, 0.8), 0 0 100px rgba(180, 180, 180, 0.6)'
                    : '0 0 10px rgba(200, 200, 200, 0.9), 0 0 20px rgba(180, 180, 180, 0.7), 0 0 30px rgba(160, 160, 160, 0.5)'
                })
              }}
              onClick={texts[textIndex].glow ? handleGlowTextClick : undefined}
              onMouseEnter={texts[textIndex].glow ? () => setIsHovering(true) : undefined}
              onMouseLeave={texts[textIndex].glow ? () => setIsHovering(false) : undefined}
            >
              {texts[textIndex].text}
            </p>
          </div>
        </div>
      )}

      {/* Click indicator */}
      {textIndex < texts.length - 1 && (
        <div className="absolute bottom-8 right-8 text-white animate-pulse" style={{ fontFamily: "'Anonymous Pro', monospace", fontSize: '0.875rem' }}>
          ▼
        </div>
      )}
    </div>
  );
}
