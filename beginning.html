<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beginning</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('Forest1.JPG') no-repeat center center fixed;
      background-size: cover;
    }

</style>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @font-face {
      font-family: 'Anonymous Pro';
      src: url('AnonymusPro-Regular.ttf') format('truetype');
    }

    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [textIndex, setTextIndex] = useState(0);
      const [showTextBox, setShowTextBox] = useState(true);
      const [isHovering, setIsHovering] = useState(false);

      const texts = [
        { text: '"Where am I?"', italic: true },
        { text: '"..."', italic: true },
        { text: '', italic: false },
        { text: "You wake up in the woods. You can't remember anything really, everything is so blury.", italic: false },
        { text: "You can't recognize the woods but this familiar feeling is haunting you. Maybe you're just having a bad dream again...", italic: false },
        { text: "Start searching images on the screen with your cursor to start to remember!", italic: false, glow: true }
      ];

      const FONT_FAMILY = "'Anonymous Pro', monospace";

      const handleClick = () => {
        if (textIndex < texts.length - 1) {
          setTextIndex(textIndex + 1);
        }
      };

      const handleGlowTextClick = (e) => {
        e.stopPropagation();
        setShowTextBox(false);
      };

      const getTextBoxPosition = () => {
        return textIndex < 2 ? 'bottom-8' : 'top-[55%] -translate-y-1/2';
      };

      const getTextStyle = () => {
        const currentText = texts[textIndex];
        return {
          fontFamily: FONT_FAMILY,
          fontSize: currentText.glow ? '16px' : '12px',
          letterSpacing: '0.05em'
        };
      };

      const currentText = texts[textIndex];

      return (
        <div
          className="w-screen h-screen relative overflow-hidden cursor-pointer"
          onClick={handleClick}
          style={{ backgroundColor: 'black' }}
        >
          {showTextBox && currentText.text && (
            <div className={`absolute left-1/2 -translate-x-1/2 w-[90%] max-w-xl ${getTextBoxPosition()}`}>
              <div className="bg-black p-6">
                <p
                  className={`text-white text-center ${currentText.italic ? 'italic' : ''}`}
                  style={getTextStyle()}
                  onClick={currentText.glow ? handleGlowTextClick : undefined}
                  onMouseEnter={currentText.glow ? () => setIsHovering(true) : undefined}
                  onMouseLeave={currentText.glow ? () => setIsHovering(false) : undefined}
                >
                  {currentText.text}
                </p>
              </div>
            </div>
          )}

          {textIndex < texts.length - 1 && (
            <div className="absolute bottom-8 right-8 text-white animate-pulse" style={{ fontFamily: FONT_FAMILY }}>
              ▼
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
