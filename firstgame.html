<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('Forest1.JPG') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Anonymous Pro', monospace;
    }

    @font-face {
      font-family: 'Anonymous Pro';
      src: url('AnonymusPro-Regular.ttf') format('truetype');
    }

    /* TEXT BOX */
    #textbox {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 40px;
      background: black;
      color: white;
      padding: 10px 20px;
      display: inline-block;
      cursor: pointer;
    }

    /* VIDEOS */
    video {
      position: absolute;
      opacity: 0.3;
      transition: opacity 0.4s ease;
    }

    video:hover {
      opacity: 1;
    }

    #kep { top: 10%; left: 35%; }
    #kep2 { top: 80%; left: 9%; }
    #kep3 { top: 60%; left: 83%; }
    #kep4 { top: 5%; left: 85%; }
    #kep5 { top: 77%; left: 20%; }
    #kep6 { top: 10%; left: 20%; }
    #kep7 { top: 33%; left: 72%; }
    #kep8 { top: 55%; left: 33%; }

    #game {
      display: none;
    }
  </style>
</head>

<body>

<div id="textbox">"Where am I?"</div>

<div id="game">
  <video width="100" height="75" autoplay muted loop>
    <source src="Fenyvidi1.mp4" type="video/mp4">
  </video>

  <video id="kep" width="200" height="175" autoplay muted loop>
    <source src="Vidi4Cicalampa.mp4" type="video/mp4">
  </video>

  <video id="kep2" width="150" height="125" autoplay muted loop>
    <source src="Vidi2TV.mp4" type="video/mp4">
  </video>

  <video id="kep3" width="150" height="125" autoplay muted loop>
    <source src="Fenyvidi5.mp4" type="video/mp4">
  </video>

  <video id="kep4" width="150" height="125" autoplay muted loop>
    <source src="Vidi6Buszmeg.mp4" type="video/mp4">
  </video>

  <video id="kep5" width="150" height="125" autoplay muted loop>
    <source src="Vidi3tabla.mp4" type="video/mp4">
  </video>

  <video id="kep6" width="150" height="125" autoplay muted loop>
    <source src="Vidi7Egeszsegugy.mp4" type="video/mp4">
  </video>

  <video id="kep7" width="150" height="125" autoplay muted loop>
    <source src="Vidi8Reklamtabla.mp4" type="video/mp4">
  </video>

  <video id="kep8" width="150" height="125" autoplay muted loop>
    <source src="Vidi9Laptop.mp4" type="video/mp4">
  </video>
</div>

<script>
  const texts = [
    '"Where am I?"',
    '"..."',
    '',
    "You wake up in the woods. You can't remember anything really, everything is so blury.",
    "You can't recognize the woods but this familiar feeling is haunting you. Maybe you're just having a bad dream again...",
    "Start searching images on the screen with your cursor to start to remember!"
  ];

  let index = 0;
  const textbox = document.getElementById('textbox');
  const game = document.getElementById('game');

  textbox.addEventListener('click', () => {
    index++;

    if (index < texts.length) {
      textbox.textContent = texts[index];

      if (index >= 2) {
        textbox.style.top = '50%';
        textbox.style.bottom = 'auto';
        textbox.style.transform = 'translate(-50%, -50%)';
      }

    } else {
      textbox.style.display = 'none';
      game.style.display = 'block';
    }
  });
</script>

</body>
</html>
