<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('Forest1.JPG') no-repeat center center fixed;
      background-size: cover;
    }

    @font-face {
      font-family: 'Anonymous Pro';
      src: url('AnonymusPro-Regular.ttf') format('truetype');
    }

    video {
      opacity: 0.3;
      transition: opacity 0.5s ease;
      position: absolute;
    }

    .discovered {
      opacity: 1 !important;
    }

    #kep { top: 10%; left: 35%; }
    #kep2 { top: 80%; left: 9%; }
    #kep3 { top: 60%; left: 83%; }
    #kep4 { top: 5%; left: 85%; }
    #kep5 { top: 77%; left: 20%; }
    #kep6 { top: 10%; left: 20%; }
    #kep7 { top: 33%; left: 72%; }
    #kep8 { top: 55%; left: 33%; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [textIndex, setTextIndex] = useState(0);
  const [showTextBox, setShowTextBox] = useState(true);
  const [gameStarted, setGameStarted] = useState(false);
  const [foundVideos, setFoundVideos] = useState({});

  const texts = [
    { text: '"Where am I?"', italic: true },
    { text: '"..."', italic: true },
    { text: '', italic: false },
    { text: "You wake up in the woods. You can't remember anything really, everything is so blury.", italic: false },
    { text: "You can't recognize the woods but this familiar feeling is haunting you. Maybe you're just having a bad dream again...", italic: false },
    { text: "Start searching images on the screen with your cursor to start to remember!", italic: false, glow: true }
  ];

  const handleClick = () => {
    if (!gameStarted && textIndex < texts.length - 1) {
      setTextIndex(textIndex + 1);
    }
  };

  const handleGlowTextClick = (e) => {
    e.stopPropagation();
    setShowTextBox(false);
    setGameStarted(true);
  };

  const discover = (id) => {
    setFoundVideos(prev => ({ ...prev, [id]: true }));
  };

  const getTextBoxPosition = () => {
    return textIndex < 2 ? 'bottom-8' : 'top-[55%] -translate-y-1/2';
  };

  const currentText = texts[textIndex];

  return (
    <div className="w-screen h-screen relative overflow-hidden cursor-pointer" onClick={handleClick}>
      
      {!gameStarted && showTextBox && currentText.text && (
        <div className={`absolute left-1/2 -translate-x-1/2 ${getTextBoxPosition()}`}>
          <div className="bg-black px-4 py-2 inline-block">
            <p
              className={`text-white text-center ${currentText.italic ? 'italic' : ''}`}
              style={{ fontFamily: "'Anonymous Pro', monospace" }}
              onClick={currentText.glow ? handleGlowTextClick : undefined}
            >
              {currentText.text}
            </p>
          </div>
        </div>
      )}

      {!gameStarted && textIndex < texts.length - 1 && (
        <div className="absolute bottom-8 right-8 text-white animate-pulse">
          ▼
        </div>
      )}

      {gameStarted && (
        <>
          {[
            { id: 'kep1', src: 'Fenyvidi1.mp4', w:100,h:75 },
            { id: 'kep', src: 'Vidi4Cicalampa.mp4', w:200,h:175 },
            { id: 'kep2', src: 'Vidi2TV.mp4', w:150,h:125 },
            { id: 'kep3', src: 'Fenyvidi5.mp4', w:150,h:125 },
            { id: 'kep4', src: 'Vidi6Buszmeg.mp4', w:150,h:125 },
            { id: 'kep5', src: 'Vidi3tabla.mp4', w:150,h:125 },
            { id: 'kep6', src: 'Vidi7Egeszsegugy.mp4', w:150,h:125 },
            { id: 'kep7', src: 'Vidi8Reklamtabla.mp4', w:150,h:125 },
            { id: 'kep8', src: 'Vidi9Laptop.mp4', w:150,h:125 }
          ].map(v => (
            <video
              key={v.id}
              id={v.id}
              width={v.w}
              height={v.h}
              autoPlay
              muted
              loop
              className={foundVideos[v.id] ? 'discovered' : ''}
              onMouseEnter={() => discover(v.id)}
            >
              <source src={v.src} type="video/mp4"/>
            </video>
          ))}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
